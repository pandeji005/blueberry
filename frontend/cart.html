<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueBerry – Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

    <!-- HEADER -->
    <div class="curve-top">
      <div class="restaurants-nav">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="nav-logo">My Cart</div>
        <div class="hamburger">☰</div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="home-content">

  <h2 class="section-title">Your Order</h2>

  <!-- EMPTY STATE — shown when cart is empty -->
  <div id="empty-cart" class="empty-cart">
    <p>🛒 Your cart is empty!</p>
    <a href="home.html" class="btn-primary">Order Food</a>
  </div>

  <!-- CART ITEMS — built dynamically by JavaScript -->
  <div id="cart-list" class="cart-list"></div>

  <!-- ORDER SUMMARY — built dynamically by JavaScript -->
  <div id="order-summary" class="order-summary" style="display:none">

    <div class="summary-row">
      <span>Subtotal</span>
      <span id="subtotal"></span>
    </div>

    <div class="summary-row">
      <span>Delivery Fee</span>
      <span>₹30</span>
    </div>

    <div class="summary-divider"></div>

    <div class="summary-row total-row">
      <span>Total</span>
      <span id="total"></span>
    </div>

  </div>

  <!-- PLACE ORDER BUTTON -->
  <button
    id="place-order-btn"
    class="btn-primary"
    onclick="placeOrder()"
    style="display:none">
    Place Order
  </button>

</div>

    <div class="curve-bottom"></div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
