<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueBerry – Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

    <!-- CURVED HEADER -->
    <div class="curve-top">
      <div class="nav">
        <div class="nav-logo">bb</div>
        <div class="nav-right">
          <span>Already have an account?</span>
          <a href="login.html" class="btn-nav">Sign In</a>
        </div>
      </div>
    </div>

    <!-- FORM SECTION -->
    <div class="form-section">

      <h1 class="form-title">Sign Up.</h1>
      <p class="form-subtitle">DELICIOUS FOOD, DELIVERY FAST</p>

      <!-- USERNAME INPUT — NEW! -->
      <div class="field-group">
        <label class="field-label" for="username">USERNAME</label>
        <input class="field-input" type="text" id="username" placeholder="your username" />
      </div>

      <!-- EMAIL INPUT -->
      <div class="field-group">
        <label class="field-label" for="signup-email">EMAIL</label>
        <input class="field-input" type="email" id="signup-email" placeholder="you@example.com" />
      </div>

      <!-- PASSWORD INPUT -->
      <div class="field-group">
        <label class="field-label" for="signup-password">PASSWORD</label>
        <input class="field-input" type="password" id="signup-password" placeholder="••••••••" />
      </div>

      <!-- SIGN UP BUTTON -->
      <button class="btn-primary" onclick="handleSignUp()">Sign Up</button>

      

      <!-- DIVIDER -->
      <div class="divider">Or sign in with</div>

      <!-- GOOGLE BUTTON -->
      <button class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google
      </button>

    </div>

    <!-- BOTTOM CURVE -->
    <div class="curve-bottom"></div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
