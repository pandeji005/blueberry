<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueBerry – Restaurants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

    <!-- HEADER -->
    <div class="curve-top">
      <div class="restaurants-nav">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="nav-logo">bb</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="home-content">

      <!-- HERO FOOD IMAGE -->
      <div class="hero-image">🍛</div>

      <!-- RESTAURANT CARDS -->
      <h2 class="section-title">Top Restaurants</h2>

      <div class="restaurant-grid">

        <a href="menu.html" class="restaurant-card">
          <div class="restaurant-card-img">🍛</div>
          <span class="restaurant-card-name">Shah Ghouse</span>
        </a>

        <a href="menu.html" class="restaurant-card">
          <div class="restaurant-card-img">🍲</div>
          <span class="restaurant-card-name">Pista House</span>
        </a>

        <a href="menu.html" class="restaurant-card">
          <div class="restaurant-card-img">🥘</div>
          <span class="restaurant-card-name">Tulips</span>
        </a>

        <a href="menu.html" class="restaurant-card">
          <div class="restaurant-card-img">🫕</div>
          <span class="restaurant-card-name">Bawarchi</span>
        </a>

      </div>

      <!-- DISCOVER MORE -->
      <a href="#" class="btn-primary">Discover More</a>

    </div>

    <div class="curve-bottom"></div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
